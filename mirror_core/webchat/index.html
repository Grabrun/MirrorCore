<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>镜核 - Mirror Core</title>
<style>
:root {
  --bg: #1a1a2e; --card: #16213e; --accent: #e94560;
  --text: #eee; --muted: #888; --user-msg: #0f3460; --bot-msg: #1a1a3e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
#app { max-width: 720px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100vh; }

/* header */
.header { padding: 12px 16px; background: var(--card); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
.header h1 { font-size: 16px; }
#status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.status-online { background: #2ecc71; }
.status-offline { background: var(--muted); }
.status-error { background: var(--accent); }

/* chat area */
#chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: var(--bot-msg); border-bottom-left-radius: 4px; }
.msg .time { font-size: 11px; color: var(--muted); margin-top: 4px; }
.msg img.emote { max-width: 120px; max-height: 120px; border-radius: 8px; display: block; margin-top: 4px; }
.load-more { text-align: center; padding: 8px; color: var(--muted); font-size: 12px; cursor: pointer; }
.load-more:hover { color: var(--accent); }

/* input area */
.input-area { padding: 12px 16px; background: var(--card); display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid #333; }
.input-area textarea { flex: 1; background: #0d1b2a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px; resize: none; max-height: 120px; outline: none; }
.input-area textarea:focus { border-color: var(--accent); }
.input-area button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

/* auth */
#auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; padding: 20px; text-align: center; }
#auth-screen h2 { font-size: 24px; }
#auth-screen p { color: var(--muted); max-width: 360px; }
#auth-screen button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 14px 36px; font-size: 16px; cursor: pointer; }

.typing { display: inline-flex; gap: 4px; }
.typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.8); } 40% { transform: scale(1.2); } }
</style>
</head>
<body>

<div id="app">
  <!-- auth screen -->
  <div id="auth-screen">
    <h2>✨ 镜核</h2>
    <p>Mirror Core — 你的专属 AI 伴侣</p>
    <button onclick="login()">开始对话</button>
    <div id="auth-error" style="color:var(--accent);font-size:13px;display:none;"></div>
  </div>

  <!-- main chat (hidden until auth) -->
  <div id="chat-ui" style="display:none;flex-direction:column;height:100vh;">
    <div class="header">
      <span id="status" class="status-offline">●</span>
      <h1>镜核</h1>
    </div>
    <div id="chat"></div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="onEnter(event)"></textarea>
      <button id="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
// ===== Config =====
const WS_BASE = window.location.origin.replace(/^http/, 'ws');
const API_BASE = window.location.origin;

let ws = null;
let token = '';
let userId = '';
let sessionId = '';
let loading = false;
let hasMore = true;

// ===== F-T03: Anonymous Auth =====
async function login() {
  const btn = document.querySelector('#auth-screen button');
  btn.disabled = true;
  btn.textContent = '连接中...';
  document.getElementById('auth-error').style.display = 'none';

  try {
    // Try anonymous auth
    const resp = await fetch(API_BASE + '/api/v1/auth/anonymous', { method: 'POST' });
    if (resp.ok) {
      const data = await resp.json();
      token = data.token || '';
      userId = data.user_id || 'anon_' + Date.now();
    } else {
      // Fallback: local dev mode with generated ID
      userId = 'anon_' + Date.now();
      token = '';
    }
    sessionId = 'session_' + userId;

    // F-T04: Report timezone
    reportTimezone();

    // Switch to chat UI
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-ui').style.display = 'flex';

    // Load history then connect WebSocket
    await loadHistory(true);
    connectWS();
  } catch (e) {
    // Offline fallback
    userId = 'anon_' + Date.now();
    sessionId = 'session_' + userId;
    token = '';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('chat-ui').style.display = 'flex';
    await loadHistory(true);
    connectWS();
  }
}

// ===== F-T04: Timezone Report =====
async function reportTimezone() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  try {
    await fetch(API_BASE + '/api/v1/user/timezone', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, timezone: tz }),
    });
  } catch (e) { /* silent */ }
}

// ===== WebSocket =====
function connectWS() {
  const url = token ? `${WS_BASE}/ws?token=${token}` : `${WS_BASE}/ws?user_id=${userId}`;
  ws = new WebSocket(url);
  setStatus('offline');

  ws.onopen = () => setStatus('online');
  ws.onclose = () => { setStatus('offline'); setTimeout(connectWS, 3000); };
  ws.onerror = () => setStatus('error');

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'reply' || data.type === 'message') {
        addMsg('bot', data.text || data.content || '', Date.now() / 1000);
      } else if (data.text) {
        addMsg('bot', data.text, Date.now() / 1000);
      }
      hideTyping();
    } catch {
      addMsg('bot', event.data, Date.now() / 1000);
      hideTyping();
    }
  };
}

function setStatus(state) {
  const el = document.getElementById('status');
  el.className = 'status-' + state;
}

// ===== Messages =====
function addMsg(role, content, timestamp) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  // 使用 textContent 防 XSS（F-001），内联表情由后端替换后再发送

  if (timestamp) {
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = formatTime(timestamp);
    div.appendChild(time);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  if (document.querySelector('.typing')) return;
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.querySelector('.typing');
  if (el) el.remove();
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  const now = new Date();
  const pad = n => n.toString().padStart(2, '0');
  if (d.toDateString() === now.toDateString()) {
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  return pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

// ===== F-T02: Load History =====
async function loadHistory(initial = false) {
  if (loading || !hasMore) return;
  loading = true;

  const chat = document.getElementById('chat');
  const firstMsg = chat.querySelector('.msg');

  // Find oldest timestamp for pagination
  let before = '';
  if (!initial) {
    const msgs = chat.querySelectorAll('.msg');
    const first = msgs[0];
    if (first) {
      const timeEl = first.querySelector('.time');
      if (timeEl && timeEl.textContent) {
        // approximate by looking for a before parameter
      }
    }
  }

  try {
    let url = `${API_BASE}/api/v1/chat/history?session_id=${encodeURIComponent(sessionId)}&user_id=${encodeURIComponent(userId)}&limit=20`;
    if (before) url += `&before=${encodeURIComponent(before)}`;
    const resp = await fetch(url, token ? { headers: { 'Authorization': 'Bearer ' + token } } : {});
    if (!resp.ok) return;
    const data = await resp.json();
    const msgs = data.messages || [];

    if (msgs.length === 0) {
      if (!initial) hasMore = false;
      return;
    }

    // Store oldest timestamp for next page
    // Render messages in reverse (oldest first) — 使用 textContent 防 XSS
    const fragment = document.createDocumentFragment();
    for (const m of msgs.reverse()) {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
      div.textContent = m.content || '';
      const time = document.createElement('div');
      time.className = 'time';
      time.dataset.ts = m.timestamp;
      time.textContent = formatTime(m.timestamp);
      div.appendChild(time);
      fragment.appendChild(div);
    }
    chat.insertBefore(fragment, chat.firstChild);
  } catch (e) { /* silent */ }
  loading = false;
}

// ===== F-T02: Scroll to top loads more =====
document.getElementById('chat').addEventListener('scroll', function() {
  if (this.scrollTop < 50 && !loading) {
    loadHistory(false);
  }
});

// ===== Send =====
function sendMsg() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addMsg('user', text, Date.now() / 1000);
  input.value = '';
  input.style.height = 'auto';

  showTyping();
  ws.send(JSON.stringify({ type: 'message', text }));
}

function onEnter(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
