# 镜核 (Mirror Core) — Nginx 反向代理配置
#
# 用法:
#   sudo cp docker/nginx/mirror-core.conf /etc/nginx/sites-enabled/
#   sudo nginx -s reload

upstream mirror-core {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name mirror.example.com;  # ← 修改为你的域名

    # 请求大小限制（支持图片上传）
    client_max_body_size 10m;

    # 日志
    access_log /var/log/nginx/mirror-core-access.log;
    error_log  /var/log/nginx/mirror-core-error.log warn;

    location / {
        proxy_pass http://mirror-core;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（WebChat 聊天用）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /app/mirror_core/webchat/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
